<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search for orientation</title>

<style>
body{
    font-family:Arial;
    margin:10px;
    padding:0;
    background:#f8f8f8;
}
.container{
    max-width:400px;
    margin:0 auto;
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
    display:flex;
    flex-direction:column;
    gap:8px;
}
h2{
    text-align:center;
    color:#333;
    margin-bottom:10px;
}
input,button{
    width:100%;
    box-sizing:border-box;
    font-size:16px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:#007bff;
    color:#fff;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
#result{
    margin-top:15px;
    font-size:18px;
    color:#555;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h2>
<span style="display:block;font-size:20px;color:#333;">
受験番号 / 学籍番号
</span>

<span style="display:block;font-size:20px;color:#333;">
Application No. or Student ID
</span>

<span style="display:block;font-size:20px;color:#333;">
准考证号 或 学号
</span>
</h2>

<input
    type="text"
    id="test_id"
    placeholder="Please enter your application number or student ID.">

<input
    type="text"
    id="birthday"
    placeholder="YYYY/MM/DD"
    maxlength="10">

<button onclick="searchStudent()">
検索 / Search
</button>

<div id="result"></div>

</div>

<script>

// ===========================
// 生年月日入力補助
// ===========================

const birthdayInput = document.getElementById("birthday");

birthdayInput.addEventListener("input", function(){

    // 数字だけ取り出す
    let value = this.value.replace(/\D/g,"").slice(0,8);

    if(value.length > 4){
        value =
            value.slice(0,4) + "/" +
            value.slice(4);
    }

    if(value.length > 7){
        value =
            value.slice(0,7) + "/" +
            value.slice(7);
    }

    this.value = value;

});

// ===========================
// 学生データ
// ===========================

let studentMap = {};
let studentIdMap = {};

// JSON読み込み
async function loadData(){

    try{

        const res = await fetch("students.json");
        const arr = await res.json();

        arr.forEach(s=>{

            studentMap[s.id]=s;
            studentIdMap[s.studentid]=s;

        });

        console.log("データ読込完了",arr.length);

    }catch(e){

        console.error(e);

        document.getElementById("result").innerText =
        "Try again";

    }

}

// ===========================
// 検索
// ===========================

function searchStudent(){

    const input =
        document.getElementById("test_id")
        .value
        .trim();

    const birthday =
        document.getElementById("birthday")
        .value
        .trim()
        .replace(/-/g,"/");

    if(!input || !birthday){

        document.getElementById("result").innerText =
        "Please enter both ID and birthday.";

        return;

    }

    const student =
        studentMap[input] ||
        studentIdMap[input];

    if(student && student.birthday === birthday){

        document.getElementById("result").innerText =
`Application Number：${student.id}
Student ID：${student.studentid}
Birthday：${student.birthday}
Orientation Room：${student.orientation_room}`;

    }else{

        document.getElementById("result").innerText =
        "Incorrect ID or birthday.";

    }

}

// 起動時
loadData();

</script>

</body>
</html>
