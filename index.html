<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Search for orientation </title>
<style>
body{font-family:Arial;margin:10px;padding:0;background:#f8f8f8}
.container{max-width:400px;margin:0 auto;background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);display:flex;flex-direction:column;gap:8px}
h2{text-align:center;color:#333;margin-bottom:10px}
input,button{width:100%;box-sizing:border-box;font-size:16px;padding:10px;border-radius:6px;border:1px solid #ccc}
button{background:#007bff;color:#fff;border:none;cursor:pointer}
button:hover{background:#0056b3}
#result{margin-top:15px;font-size:18px;color:#555;white-space:pre-line}
</style>
</head>
<body>
<div class="container">
<h2>
  <span style="display:block; font-size:20px; color:#333;">
    受験番号 / 学籍番号
  </span>
  <span style="display:block; font-size:20px; color:#333;">
    Application No. or Student ID
  </span>
  <span style="display:block; font-size:20px; color:#333;">
    准考证号 或 学号
  </span>
</h2>
<input type="text" id="test_id" placeholder="Please enter your application number or student ID.">
<button onclick="searchStudent()">検索 / Search</button>
<div id="result"></div>
</div>

<script>
// 两个索引：id + studentid
let studentMap = {};
let studentIdMap = {};

// 加载数据
async function loadData(){
    try{
        const res = await fetch('students.json');
        const arr = await res.json();

        arr.forEach(s => {
            studentMap[s.id] = s;              // id 索引
            studentIdMap[s.studentid] = s;     // studentid 索引
        });

        console.log('数据加载完成', arr.length);
    }catch(e){
        console.error('加载 JSON 失败', e);
        document.getElementById('result').innerText='Try again';
    }
}

// 查询函数
function searchStudent(){
    const input = document.getElementById('test_id').value.trim();

    if(!input){
        document.getElementById('result').innerText='Please enter your examination number.';
        return;
    }

    // 同时支持 id 或 studentid
    const student = studentMap[input] || studentIdMap[input];

    if(student){
        document.getElementById('result').innerText =
`Application Number：${student.id}
Student ID：${student.studentid}
Orientation room：${student.orientation_room}`;
    }else{
        document.getElementById('result').innerText=' No results found. ';
    }
}

// 页面加载时执行
loadData();
</script>
</body>
</html>
